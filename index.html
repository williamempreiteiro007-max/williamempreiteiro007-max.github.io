<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faça o seu Orçamento</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .container-principal {
            background-color: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        .leao-logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 20px;
            border: 5px solid #FF8C00;
            box-shadow: 0 5px 15px rgba(255,140,0,0.2);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 10px;
            background-color: #f8f9fa;
            border-left: 4px solid #FF8C00;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2c3e50;
            font-size: 1.05rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #FF8C00;
            box-shadow: 0 0 0 3px rgba(255,140,0,0.1);
        }

        /* BOTÕES MODERNOS E CHAMATIVOS */
        .botoes-container {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        .btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-calcular {
            background: linear-gradient(135deg, #FF8C00 0%, #FFA500 100%);
            color: white;
        }

        .btn-calcular:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,140,0,0.3);
        }

        .btn-pdf {
            background: linear-gradient(135deg, #2c3e50 0%, #4a6990 100%);
            color: white;
        }

        .btn-pdf:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44,62,80,0.3);
        }

        .btn-limpar {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }

        .btn-limpar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231,76,60,0.3);
        }

        /* MENSAGEM DE VALOR EM DESTAQUE */
        .resultado-site {
            background: linear-gradient(135deg, #FF8C00 0%, #FFA500 100%);
            color: white;
            font-weight: 600;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
            font-size: 1.2rem;
            white-space: pre-line;
            box-shadow: 0 5px 15px rgba(255,140,0,0.2);
        }

        textarea {
            resize: none;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <div class="container-principal">
        <img src="https://i.postimg.cc/XYSHLS21/leao-(1).jpg" alt="Logo Leão" class="leao-logo">
        <h1>📐 Faça o seu Orçamento de Construção</h1>
        
        <div class="form-group">
            <label>1. 🛠️ ESCOLHA O SERVIÇO:</label>
            <select id="servico">
                <option value="alvenaria">ALVENARIA (M²) - R$52,00</option>
                <option value="reboco">REBOCO (M²) - R$35,00</option>
                <option value="porcelanato">PORCELANATO (M²) - R$60,00</option>
                <option value="ceramica">CERÂMICA (M²) - R$40,00</option>
                <option value="concreto">CONCRETO (M³) - R$150,00</option>
                <option value="gesso">GESSO (M²) - R$20,00</option>
            </select>
        </div>

        <div class="form-group">
            <label>2. 📏 MEDIDAS (em metros):</label>
            <input type="number" id="medida1" placeholder="Horizontal (m)" step="0.01" min="0">
            <input type="number" id="medida2" placeholder="Vertical (m)" step="0.01" min="0">
            <input type="number" id="medida3" placeholder="Profundidade (apenas para M³)" step="0.01" min="0" style="display: none; margin-top: 10px;">
        </div>

        <!-- MENSAGEM DE VALOR NO MEIO -->
        <div class="resultado-site" id="resultado-site" style="display: none;">
            SERVIÇO: ALVENARIA
            MEDIDA TOTAL: 12.00 M²
            VALOR TOTAL: R$ 624.00
        </div>

        <div class="form-group">
            <label>3. 🧑‍🤝‍🧑 DADOS DO CLIENTE:</label>
            <input type="text" id="nome" placeholder="Nome completo">
            <input type="date" id="data" style="margin-top: 10px;">
            <input type="text" id="endereco" placeholder="Endereço da obra" style="margin-top: 10px;">
            <input type="email" id="email" placeholder="E-mail (opcional)" style="margin-top: 10px;">
            <input type="text" id="telefone" placeholder="Telefone (opcional)" style="margin-top: 10px;">
            <textarea id="obs" placeholder="Observações" style="margin-top: 10px;"></textarea>
        </div>

        <div class="botoes-container">
            <button class="btn btn-calcular" onclick="calcular()">Calcular</button>
            <button class="btn btn-pdf" onclick="gerarPDF()">Gerar PDF</button>
            <button class="btn btn-limpar" onclick="limpar()">Limpar</button>
        </div>
    </div>

    <script>
        // Dados dos serviços
        const precos = {
            alvenaria: 52.00,
            reboco: 35.00,
            porcelanato: 60.00,
            ceramica: 40.00,
            concreto: 150.00,
            gesso: 20.00
        };

        // Ajusta campos de medida conforme serviço
        document.getElementById('servico').addEventListener('change', function() {
            const servico = this.value;
            document.getElementById('medida3').style.display = (servico === 'concreto') ? 'block' : 'none';
        });

        // Função de cálculo
        function calcular() {
            const servico = document.getElementById('servico').value;
            const med1 = parseFloat(document.getElementById('medida1').value);
            const med2 = parseFloat(document.getElementById('medida2').value);
            let med3 = parseFloat(document.getElementById('medida3').value);

            if (!med1 || !med2 || (servico === 'concreto' && !med3)) {
                alert("⚠️ Preencha todas as medidas obrigatórias!");
                return;
            }

            let medidaTotal = 0;
            let tipoMedida = "M²";
            let valorTotal = 0;

            if(servico === 'concreto'){
                medidaTotal = med1 * med2 * med3;
                tipoMedida = "M³";
                valorTotal = medidaTotal * precos.concreto;
            } else {
                medidaTotal = med1 * med2;
                valorTotal = medidaTotal * precos[servico];
            }

            const resultado = `
📊 SERVIÇO: ${servico.toUpperCase()}
📏 MEDIDA TOTAL: ${medidaTotal.toFixed(2)} ${tipoMedida}
💰 VALOR TOTAL: R$ ${valorTotal.toFixed(2)}
            `;
            document.getElementById('resultado-site').textContent = resultado;
            document.getElementById('resultado-site').style.display = 'block';
        }

        // Função GERAR PDF COMPLETA
        function gerarPDF() {
            const resultadoVisivel = document.getElementById('resultado-site').style.display === 'block';
            if (!resultadoVisivel) {
                alert("⚠️ Calcule o orçamento primeiro!");
                return;
            }

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'pt',
                format: 'a4'
            });

            pdf.setFont("Helvetica");
            
            // Título principal - 24pt
            pdf.setFontSize(24);
            pdf.text("Faça o seu Orçamento", 200, 30, { align: 'center' });

            // Imagem do leão
            pdf.addImage("https://i.postimg.cc/XYSHLS21/leao-(1).jpg", 'JPG', 180, 40, 40, 40);
            pdf.setDrawColor(255,140,0);
            pdf.circle(200, 60, 20);

            // Dados do Cliente
            pdf.setFontSize(22);
            pdf.text("📋 DADOS DO CLIENTE", 20, 100);
            pdf.setFontSize(20);
            const nome = document.getElementById('nome').value || "Não informado";
            const data = document.getElementById('data').value || "Não informado";
            const endereco = document.getElementById('endereco').value || "Não informado";
            const email = document.getElementById('email').value || "Não informado";
            const telefone = document.getElementById('telefone').value || "Não informado";
            const obs = document.getElementById('obs').value || "Não informado";

            pdf.text(`Nome: ${nome}`, 20, 120);
            pdf.text(`Data: ${data}`, 20, 140);
            pdf.text(`Endereço: ${endereco}`, 20, 160);
            pdf.text(`E-mail: ${email}`, 20, 180);
            pdf.text(`Telefone: ${telefone}`, 20, 200);

            // Resultados
            pdf.setFontSize(22);
            pdf.text("📊 RESULTADOS DOS CÁLCULOS", 20, 230);
            pdf.setFontSize(20);
            const servico = document.getElementById('servico').value;
            const med1 = document.getElementById('medida1').value;
            const med2 = document.getElementById('medida2').value;
            const med3 = document.getElementById('medida3').value;
            const resultado = document.getElementById('resultado-site').textContent;

            pdf.text(`Serviço: ${servico.toUpperCase()}`, 20, 250);
            let medidaTxt = `Medidas: ${med1}m X ${med2}m`;
            if(servico === 'concreto') medidaTxt += ` X ${med3}m`;
            pdf.text(medidaTxt, 20, 270);
            pdf.text(resultado.trim(), 20, 290);

            // Observações
            pdf.setFontSize(22);
            pdf.text("💡 OBSERVAÇÕES", 20, 350);
            pdf.setFontSize(20);
            pdf.text(obs, 20, 370);

            // Contato
            pdf.setFontSize(20);
            pdf.text("📞 Se gostar, entre em contato pelo WhatsApp: (55)31990721928", 20, 420);

            // Salva o PDF
            pdf.save(`Orçamento_${nome.replace(/\s/g, '_')}.pdf`);
        }

        // Função limpar
        function limpar() {
            document.querySelectorAll('input, select, textarea').forEach(el => el.value = '');
            document.getElementById('resultado-site').style.display = 'none';
            document.getElementById('medida3').style.display = 'none';
        }
    </script>
</body>
</html>
