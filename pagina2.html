<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Empreiteiro - Orçamento</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div class="container">
        <h1>ORÇAMENTO - SELECIONE AS MEDIDAS</h1>

        <div class="input-group">
            <label for="med1">Medida 1 (m):</label>
            <input type="number" id="med1" step="0.01" placeholder="Ex: 5.20">
        </div>

        <div class="input-group">
            <label for="med2">Medida 2 (m):</label>
            <input type="number" id="med2" step="0.01" placeholder="Ex: 3.50">
        </div>

        <div class="input-group" id="med3-group" style="display: none;">
            <label for="med3">Medida 3 (m):</label>
            <input type="number" id="med3" step="0.01" placeholder="Ex: 0.15">
        </div>

        <button class="btn btn-primary" id="calc-btn">CALCULAR VALOR</button>

        <div class="result-box" id="result-box"></div>

        <button class="btn btn-primary" id="next-btn">IR PARA DADOS DO CLIENTE</button>
        <button class="btn btn-secondary" id="back-btn">VOLTAR PARA SELEÇÃO</button>
    </div>

    <script src="global.js"></script>
    <script>
        // CARREGAR DADOS DO SERVIÇO SELECIONADO
        const serviceId = loadData('serviceId');
        const service = SERVICES[serviceId];
        
        // MOSTRAR MEDIDA 3 SE FOR CONCRETO
        if (service.type === 'm³') {
            document.getElementById('med3-group').style.display = 'block';
        }

        // CALCULAR VALOR
        document.getElementById('calc-btn').addEventListener('click', () => {
            const m1 = parseFloat(document.getElementById('med1').value);
            const m2 = parseFloat(document.getElementById('med2').value);
            let m3 = 1;

            if (service.type === 'm³') {
                m3 = parseFloat(document.getElementById('med3').value);
            }

            if (isNaN(m1) || isNaN(m2) || (service.type === 'm³' && isNaN(m3))) {
                alert('PREENCHA TODAS AS MEDIDAS!');
                return;
            }

            const totalMeasure = service.type === 'm³' ? m1 * m2 * m3 : m1 * m2;
            const totalPrice = totalMeasure * service.price;

            document.getElementById('result-box').textContent = `
MEDIDAS: ${m1}m x ${m2}m ${service.type === 'm³' ? `x ${m3}m` : ''}
TOTAL: ${totalMeasure.toFixed(2)} ${service.type}
VALOR TOTAL: R$ ${totalPrice.toFixed(2).replace('.', ',')}
            `;

            // SALVAR DADOS DO ORÇAMENTO
            saveData('totalMeasure', totalMeasure);
            saveData('totalPrice', totalPrice);
        });

        // NAVEGAÇÃO
        document.getElementById('back-btn').addEventListener('click', () => goToPage('pagina1.html'));
        document.getElementById('next-btn').addEventListener('click', () => {
            if (!loadData('totalPrice')) {
                alert('CALCULE O ORÇAMENTO PRIMEIRO!');
                return;
            }
            goToPage('pagina3.html');
        });
    </script>
</body>
</html>
