<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faça o seu Orçamento</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(120deg, #ffeaa7 0%, #fab1a0 33%, #74b9ff 66%, #0984e3 100%);
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .container-principal {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .leao-logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 20px;
            border: 5px solid #FF9800;
            box-shadow: 0 8px 25px rgba(255,152,0,0.3);
        }

        h1 {
            text-align: center;
            color: #2d3436;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        /* MENSAGEM DE VALOR SUPER CHAMATIVA */
        .valor-destaque {
            background: linear-gradient(90deg, #FF5722 0%, #FF9800 50%, #FFC107 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
            margin: 0 0 30px 0;
            box-shadow: 0 8px 25px rgba(255,87,34,0.3);
            border: 3px solid white;
        }

        .valor-destaque p:first-child {
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .valor-final {
            font-size: 2.5rem;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            background-color: white;
            color: #FF5722;
            padding: 10px 25px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .grupo-formulario {
            margin-bottom: 25px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 15px;
            border-left: 5px solid #FF9800;
        }

        .grupo-formulario h2 {
            color: #2d3436;
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2d3436;
            font-weight: 600;
            font-size: 1.05rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #FF9800;
            box-shadow: 0 0 0 3px rgba(255,152,0,0.2);
        }

        /* BOTÕES MODERNOS E COLORIDOS */
        .botoes-area {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .btn-calcular {
            background: linear-gradient(135deg, #FF9800 0%, #FFC107 100%);
            color: white;
        }

        .btn-pdf {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
        }

        .btn-limpar {
            background: linear-gradient(135deg, #E53935 0%, #C62828 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>
    <div class="container-principal">
        <img src="https://i.postimg.cc/XYSHLS21/leao-(1).jpg" alt="Logo Leão" class="leao-logo">
        <h1>📐 Faça o seu Orçamento de Construção</h1>

        <!-- MENSAGEM DE VALOR BEM EM CIMA -->
        <div class="valor-destaque" id="valor-destaque" style="display: none;">
            <p>✅ Valor do Orçamento</p>
            <span class="valor-final" id="valor-final"></span>
        </div>

        <!-- GRUPO DE SERVIÇOS -->
        <div class="grupo-formulario">
            <h2>🛠️ Selecione o Serviço</h2>
            <label for="servico">Tipo de Serviço:</label>
            <select id="servico">
                <option value="alvenaria">Alvenaria - R$52,00/m²</option>
                <option value="reboco">Reboco - R$35,00/m²</option>
                <option value="porcelanato">Porcelanato - R$60,00/m²</option>
                <option value="ceramica">Cerâmica - R$40,00/m²</option>
                <option value="concreto">Concreto - R$150,00/m³</option>
            </select>

            <label for="medida1">Medida 1 (Horizontal em m):</label>
            <input type="number" id="medida1" placeholder="Ex: 2">
            
            <label for="medida2">Medida 2 (Vertical em m):</label>
            <input type="number" id="medida2" placeholder="Ex: 6">
            
            <label for="medida3" id="label-medida3" style="display: none;">Medida 3 (Profundidade em m - só para Concreto):</label>
            <input type="number" id="medida3" placeholder="Ex: 0.5" style="display: none;">
        </div>

        <!-- GRUPO DE DADOS DO CLIENTE -->
        <div class="grupo-formulario">
            <h2>👤 Dados do Cliente</h2>
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" placeholder="Seu nome">
            
            <label for="data">Data do Orçamento:</label>
            <input type="date" id="data">
            
            <label for="endereco">Endereço da Obra:</label>
            <input type="text" id="endereco" placeholder="Rua, bairro, cidade">
            
            <label for="email">E-mail:</label>
            <input type="email" id="email" placeholder="seu@email.com">
            
            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" placeholder="(XX) XXXXX-XXXX">
            
            <label for="obs">Observações:</label>
            <textarea id="obs" placeholder="Alguma observação importante..."></textarea>
        </div>

        <!-- ÁREA DOS BOTÕES -->
        <div class="botoes-area">
            <button class="btn btn-calcular" onclick="calcularOrcamento()">Calcular</button>
            <button class="btn btn-pdf" onclick="gerarPDF()">Gerar PDF</button>
            <button class="btn btn-limpar" onclick="limparFormulario()">Limpar</button>
                </div>
                    <script>
        // DADOS DOS SERVIÇOS
        const precosServicos = {
            alvenaria: 52.00,
            reboco: 35.00,
            porcelanato: 60.00,
            ceramica: 40.00,
            concreto: 150.00
        };

        // MOSTRA CAMPO DE PROFUNDIDADE APENAS PARA CONCRETO
        document.getElementById('servico').addEventListener('change', function() {
            const servicoSelecionado = this.value;
            const medida3 = document.getElementById('medida3');
            const labelMedida3 = document.getElementById('label-medida3');
            
            if(servicoSelecionado === 'concreto') {
                medida3.style.display = 'block';
                labelMedida3.style.display = 'block';
            } else {
                medida3.style.display = 'none';
                labelMedida3.style.display = 'none';
            }
        });

        // FUNÇÃO DE CÁLCULO
        function calcularOrcamento() {
            const servico = document.getElementById('servico').value;
            const med1 = parseFloat(document.getElementById('medida1').value);
            const med2 = parseFloat(document.getElementById('medida2').value);
            const med3 = parseFloat(document.getElementById('medida3').value) || 0;

            // VERIFICA SE OS CAMPOS ESTÃO PREENCHIDOS
            if(!med1 || !med2 || (servico === 'concreto' && !med3)) {
                alert('⚠️ Preencha todas as medidas obrigatórias primeiro!');
                return;
            }

            // CALCULA O VALOR TOTAL
            let medidaTotal = 0;
            let unidade = 'm²';
            
            if(servico === 'concreto') {
                medidaTotal = med1 * med2 * med3;
                unidade = 'm³';
            } else {
                medidaTotal = med1 * med2;
            }

            const valorTotal = medidaTotal * precosServicos[servico];
            const valorFormatado = `R$ ${valorTotal.toFixed(2)} (${medidaTotal.toFixed(2)} ${unidade})`;

            // MOSTRA A MENSAGEM EM DESTAQUE NO TOPO
            const areaDestaque = document.getElementById('valor-destaque');
            const valorFinal = document.getElementById('valor-final');
            
            valorFinal.textContent = valorFormatado;
            areaDestaque.style.display = 'block';
        }

        // FUNÇÃO PARA GERAR PDF NA PASTA DOCUMENTOS
        function gerarPDF() {
            const valorDestaque = document.getElementById('valor-destaque').style.display;
            if(valorDestaque === 'none') {
                alert('⚠️ Calcule o orçamento primeiro!');
                return;
            }

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });

            // CONFIGURAÇÕES DO PDF
            pdf.setFontSize(20);
            pdf.text('📐 ORÇAMENTO DE CONSTRUÇÃO', 105, 20, { align: 'center' });
            
            // ADICIONA LOGO
            pdf.addImage('https://i.postimg.cc/XYSHLS21/leao-(1).jpg', 'JPG', 85, 30, 40, 40);
            pdf.setDrawColor(255,152,0);
            pdf.circle(105, 50, 20);

            // DADOS DO CLIENTE NO PDF
            pdf.setFontSize(14);
            pdf.text('👤 DADOS DO CLIENTE:', 20, 80);
            pdf.text(`Nome: ${document.getElementById('nome').value || 'Não informado'}`, 20, 95);
            pdf.text(`Data: ${document.getElementById('data').value || 'Não informado'}`, 20, 110);
            pdf.text(`Endereço: ${document.getElementById('endereco').value || 'Não informado'}`, 20, 125);
            pdf.text(`E-mail: ${document.getElementById('email').value || 'Não informado'}`, 20, 140);
            pdf.text(`Telefone: ${document.getElementById('telefone').value || 'Não informado'}`, 20, 155);
            pdf.text(`Observações: ${document.getElementById('obs').value || 'Não informado'}`, 20, 170);

            // VALOR DO ORÇAMENTO NO PDF
            pdf.setFontSize(16);
            pdf.text('💲 VALOR DO ORÇAMENTO:', 20, 200);
            pdf.text(document.getElementById('valor-final').textContent, 20, 215);

            // MENSAGEM DE CONTATO
            pdf.setFontSize(14);
            pdf.text('📞 Contato: WhatsApp (55)31990729916', 20, 240);

            // SALVA NA PASTA DOCUMENTOS (o navegador direciona para lá por padrão)
            const nomeCliente = document.getElementById('nome').value || 'Orçamento';
            pdf.save(`${nomeCliente}_Orçamento.pdf`);
            
            alert('✅ PDF SALVO COM SUCESSO! Verifique a pasta DOCUMENTOS do seu celular!');
        }

        // FUNÇÃO PARA LIMPAR O FORMULÁRIO
        function limparFormulario() {
            document.querySelectorAll('input, select, textarea').forEach(campo => campo.value = '');
            document.getElementById('valor-destaque').style.display = 'none';
            document.getElementById('medida3').style.display = 'none';
            document.getElementById('label-medida3').style.display = 'none';
        }
    </script>
</body>
</html>
