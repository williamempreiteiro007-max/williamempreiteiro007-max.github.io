<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Empreiteiro - Dados do Cliente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background-color: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        h1 {
            color: #2d5d2a;
            text-align: center;
            font-size: 22px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #333;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 18px;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background 0.3s ease;
        }

        .btn-primary {
            background-color: #2d5d2a;
            color: white;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DADOS DO CLIENTE E PDF</h1>

        <div class="input-group">
            <label for="nome">Nome do Cliente:</label>
            <input type="text" id="nome" placeholder="Ex: João da Silva">
        </div>

        <div class="input-group">
            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" placeholder="(31) 99999-9999">
        </div>

        <div class="input-group">
            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" placeholder="Rua das Flores, 123">
        </div>

        <div class="input-group">
            <label for="obs">Observações:</label>
            <input type="text" id="obs" placeholder="Digite observações">
        </div>

        <button class="btn btn-primary" id="save-pdf">GERAR PDF</button>
        <button class="btn btn-secondary" id="back-btn">VOLTAR PARA ORÇAMENTO</button>
    </div>

    <script>
        function loadData(key) {
            return localStorage.getItem(key);
        }

        // NAVEGAÇÃO
        document.getElementById('back-btn').addEventListener('click', () => {
            window.location.href = 'pagina2.html';
        });

        // GERAR PDF
        document.getElementById('save-pdf').addEventListener('click', () => {
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const endereco = document.getElementById('endereco').value;
            const obs = document.getElementById('obs').value;

            if (!nome) {
                alert('PREENCHA O NOME DO CLIENTE!');
                return;
            }

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();

            // DADOS DO ORÇAMENTO
            const serviceName = loadData('serviceName');
            const totalPrice = parseFloat(loadData('totalPrice'));
            const totalMeasure = loadData('totalMeasure');
            const serviceType = loadData('serviceType');

            // CRIAR PDF
            pdf.setFontSize(24);
            pdf.text('WILLIAM EMPREITEIRO - ORÇAMENTO', 105, 20, { align: 'center' });
            
            pdf.setFontSize(22);
            pdf.text('DADOS DO SERVIÇO', 105, 40, { align: 'center' });
            
            pdf.setFontSize(20);
            pdf.text(`SERVIÇO: ${serviceName}`, 20, 60);
            pdf.text(`TOTAL: ${totalMeasure} ${serviceType}`, 20, 80);
            pdf.text(`VALOR: R$ ${totalPrice.toFixed(2).replace('.', ',')}`, 20, 100);

            // DADOS DO CLIENTE
            pdf.addPage();
            pdf.setFontSize(22);
            pdf.text('DADOS DO CLIENTE', 105, 20, { align: 'center' });
            
            pdf.setFontSize(20);
            pdf.text(`NOME: ${nome}`, 20, 40);
            pdf.text(`TELEFONE: ${telefone}`, 20, 60);
            pdf.text(`ENDEREÇO: ${endereco}`, 20, 80);
            pdf.text(`OBSERVAÇÕES: ${obs}`, 20, 100);

            // SALVAR PDF
            pdf.save(`Orçamento_${nome}.pdf`);
            alert('PDF GERADO COM SUCESSO!');
        });
    </script>
</body>
</html>
