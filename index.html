<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faça o seu Orçamento - Construção Civil</title>
    <style>
        /* Estilos gerais do site */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        /* Estilo da imagem do leão (bordas arredondadas no site E no PDF) */
        .leao-logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #FF8C00;
            display: block;
            margin: 0 auto 20px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        h2 {
            color: #FF8C00;
            margin: 20px 0 10px;
            font-size: 1.5rem;
        }

        .secao {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 5px;
        }

        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .botoes {
            background-color: #FF8C00;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px 5px;
            transition: background-color 0.3s;
        }

        .botoes:hover {
            background-color: #e67e00;
        }

        .resultado {
            background-color: #e9f7fe;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            font-weight: bold;
        }

        /* Estilos que serão replicados no PDF */
        @media print {
            .leao-logo {
                border-radius: 50%;
                border: 5px solid #FF8C00;
            }

            h1 {
                font-size: 24pt;
            }

            h2 {
                font-size: 22pt;
            }

            p, label, input, textarea, select {
                font-size: 20pt;
            }
        }
    </style>
    <!-- Biblioteca para gerar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

        <h1>Faça o seu Orçamento</h1>

                <option value="5">CONCRETO (M³) - Apenas mão de obra</option>
                <option value="6">GESSO (M²) - Apenas mão de obra</option>
            </select>
        </div>

        <!-- Seção de medidas -->
        <div class="secao" id="secao-medidas">

        <!-- Seção de dados do cliente -->
        <div class="secao">

            <label for="endereco">Endereço da Obra:</label>

        <div class="secao" id="secao-resultado" style="display: none;">

        // Dados dos serviços
        const servicos = {

            "2": {"nome": "REBOCO", "tipo": "M²", "valor": 35.00, "desc": "Apenas mão de obra para reboco de paredes"},
            "3": {"nome": "ACABAMENTO (PORCELANATO)", "tipo": "M²", "valor": 60.00, "desc": "Apenas mão de obra para assentamento de porcelanato"},
            "4": {"nome": "ACABAMENTO (CERÂMICA)", "tipo": "M²", "valor": 40.00, "desc": "Apenas mão de obra para assentamento de cerâmica"},
            "5": {"nome": "CONCRETO", "tipo": "M³", "valor": 150.00, "desc": "Apenas mão de obra para estruturas"},
            "6": {"nome": "GESSO", "tipo": "M²", "valor": 20.00, "desc": "Apenas mão de obra - valor fixo por m²"}
        };

        // Mostra campos de medidas conforme serviço escolhido
        document.getElementById('servico').addEventListener('change', atualizarCamposMedidas);
        atualizarCamposMedidas();

        function atualizarCamposMedidas() {
            const servicoId = document.getElementById('servico').value;
            const servico = servicos[servicoId];
            const camposDiv = document.getElementById('campos-medidas');
            
            camposDiv.innerHTML = '';

            if (servico.tipo === "M²") {
                camposDiv.innerHTML = `
                    <label for="horizontal">Horizontal (m):</label>
                    <input type="number" id="horizontal" step="0.01" min="0" required>

                    <label for="vertical">Vertical (m):</label>
                    <input type="number" id="vertical" step="0.01" min="0" required>
                `;
            } else {
                camposDiv.innerHTML = `
                    <label for="horizontal">Horizontal (m):</label>
                    <input type="number" id="horizontal" step="0.01" min="0" required>

                    <label for="vertical">Vertical (m):</label>
                    <input type="number" id="vertical" step="0.01" min="0" required>

                    <label for="profundidade">Profundidade/Altura (m):</label>
                    <input type="number" id="profundidade" step="0.01" min="0" required>
                `;
            }
        }

        // Função para calcular orçamento
        function calcularOrcamento() {
            const servicoId = document.getElementById('servico').value;
            const servico = servicos[servicoId];
            const horizontal = parseFloat(document.getElementById('horizontal').value) || 0;
            const vertical = parseFloat(document.getElementById('vertical').value) || 0;
            
            let medidaTotal = 0;
            let detalhes = '';

            if (servico.tipo === "M²") {
                medidaTotal = horizontal * vertical;
                detalhes = `
                    Serviço: ${servico.nome}
                    Tipo de Cálculo: ${servico.tipo}
                    Descrição: ${servico.desc}
                    Fórmula: HORIZONTAL X VERTICAL
                    Medidas: ${formatarNumero(horizontal)}m X ${formatarNumero(vertical)}m = ${formatarNumero(medidaTotal)}${servico.tipo}
                    Valor por ${servico.tipo}: R$ ${formatarNumero(servico.valor)}
                    VALOR TOTAL: R$ ${formatarNumero(medidaTotal * servico.valor)}
                `;
            } else {
                const profundidade = parseFloat(document.getElementById('profundidade').value) || 0;
                medidaTotal = horizontal * vertical * profundidade;
                detalhes = `
                    Serviço: ${servico.nome}
                    Tipo de Cálculo: ${servico.tipo}
                    Descrição: ${servico.desc}
                    Fórmula: HORIZONTAL X VERTICAL X PROFUNDIDADE
                    Medidas: ${formatarNumero(horizontal)}m X ${formatarNumero(vertical)}m X ${formatarNumero(profundidade)}m = ${formatarNumero(medidaTotal)}${servico.tipo}
                    Valor por ${servico.tipo}: R$ ${formatarNumero(servico.valor)}
                    VALOR TOTAL: R$ ${formatarNumero(medidaTotal * servico.valor)}
                `;
            }

            document.getElementById('resultado').textContent = detalhes;
            document.getElementById('secao-resultado').style.display = 'block';
        }
