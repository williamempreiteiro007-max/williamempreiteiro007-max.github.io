<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Orçamentos</title>
    <style>
        body {
            padding: 10px;
            font-family: Arial;
        }
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: green;
            color: white;
            border: none;
            font-size: 16px;
        }
        .tela {
            display: none;
        }
        .mostrar {
            display: block;
        }
    </style>
</head>
<body>

<div>
    <!-- TELA INICIAL -->
    <div id="tela-inicial" class="tela mostrar">
        <h1>SISTEMA DE ORÇAMENTOS</h1>
        <button onclick="irParaTela('servicos')">VER SERVIÇOS</button>
    </div>
    <!-- TELA DE SERVIÇOS -->
    <div id="servicos" class="tela">
        <h2>OPÇÕES DE SERVIÇOS</h2>
        <button onclick="calcular(1)">1 - ALVENARIA (R$52/m²)</button>
        <button onclick="calcular(2)">2 - REBOCO (R$35/m²)</button>
        <button onclick="calcular(3)">3 - PORCELANATO (R$60/m²)</button>
        <button onclick="calcular(4)">4 - CERÂMICA (R$40/m²)</button>
        <button onclick="calcular(5)">5 - CONCRETO (R$150/m³)</button>
        <button onclick="calcular(6)">6 - GESSO (R$20/m²)</button>
        <button onclick="irParaTela('inicial')">VOLTAR</button>
    </div>
        <!-- TELA DE CÁLCULO -->
    <div id="calculos" class="tela">
        <h2>CÁLCULO FINAL</h2>
        <div id="resultado"></div>
        <button onclick="irParaTela('servicos')">NOVO CÁLCULO</button>
        <button onclick="irParaTela('inicial')">VOLTAR AO INÍCIO</button>
    </div>

<script>
// MUDAR DE TELA
function irParaTela(nomeTela) {
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('mostrar'));
    document.getElementById(nomeTela).classList.add('mostrar');
}

// FAZER O CÁLCULO
function calcular(tipo) {
    let medida1 = prompt("Digite a LARGURA em metros:");
    let medida2 = prompt("Digite a COMPRIMENTO em metros:");
    let resultado = 0;
    let valor = 0;

    if(tipo == 1) valor = 52;
    if(tipo == 2) valor = 35;
    if(tipo == 3) valor = 60;
    if(tipo == 4) valor = 40;
    if(tipo == 5) valor = 150;
    if(tipo == 6) valor = 20;

    if(tipo != 5) {
        resultado = parseFloat(medida1) * parseFloat(medida2) * valor;
        document.getElementById('resultado').innerHTML = `
            Área: ${parseFloat(medida1)*parseFloat(medida2)} m²<br>
            Valor total: R$ ${resultado.toFixed(2)}
        `;
    } else {
        let medida3 = prompt("Digite a ALTURA em metros:");
        resultado = parseFloat(medida1) * parseFloat(medida2) * parseFloat(medida3) * valor;
        document.getElementById('resultado').innerHTML = `
            Volume: ${parseFloat(medida1)*parseFloat(medida2)*parseFloat(medida3)} m³<br>
            Valor total: R$ ${resultado.toFixed(2)}
        `;
    }

    irParaTela('calculos');
}
</script>
</body>
</html>
