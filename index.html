<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Empreiteiro - Orçamentos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            padding: 20px;
        }

        .app-container {
            max-width: 700px;
            margin: 0 auto;
            background-color: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
        }

        .lion-container {
            width: 250px;
            height: 250px;
            margin: 0 auto 30px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #2d5d2a;
        }

        .lion-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-header h1 {
            color: #2d5d2a;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .app-header p {
            color: #666;
            text-align: center;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .service-card {
            border: 2px solid #2d5d2a;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: white;
            color: #333;
        }

        .service-card:hover {
            background-color: #2d5d2a;
            color: white;
        }

        .service-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .service-card p {
            font-size: 14px;
        }

        .calculator-section {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .calculator-section h2 {
            color: #2d5d2a;
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-bottom: 10px;
        }

        .btn-primary {
            background-color: #2d5d2a;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1e3d1c;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #545b62;
        }

        .result-box {
            background-color: #f8f9fa;
            border: 1px solid #2d5d2a;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            white-space: pre-line;
        }

        .observations-list {
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            white-space: pre-line;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="lion-container">
                <img src="https://i.postimg.cc/XYSHLS21/leao-(1).jpg" alt="Leão" class="lion-img">
            </div>
            <h1>William Empreiteiro - Orçamentos</h1>
            <p>Sistema moderno para cálculo e emissão de orçamentos</p>
        </div>

        <div class="services-grid" id="services-section">
            <div class="service-card" data-service="1">
                <h3>ALVENARIA</h3>
                <p>R$52,00 / m²</p>
            </div>
            <div class="service-card" data-service="2">
                <h3>REBOCO</h3>
                <p>R$35,00 / m²</p>
            </div>
            <div class="service-card" data-service="3">
                <h3>PORCELANATO</h3>
                <p>R$60,00 / m²</p>
            </div>
            <div class="service-card" data-service="4">
                <h3>CERÂMICA</h3>
                <p>R$40,00 / m²</p>
            </div>
            <div class="service-card" data-service="5">
                <h3>CONCRETO</h3>
                <p>R$150,00 / m³</p>
            </div>
            <div class="service-card" data-service="6">
                <h3>GESSO</h3>
                <p>R$20,00 / m²</p>
            </div>
        </div>

        <div id="calculator-section" class="calculator-section">
            <h2 id="service-title"></h2>
            <div class="input-group">
                <label for="measure1">Medida 1 (m):</label>
                <input type="number" id="measure1" placeholder="Ex: 5.20" step="0.01">
            </div>
            <div class="input-group">
                <label for="measure2">Medida 2 (m):</label>
                <input type="number" id="measure2" placeholder="Ex: 3.50" step="0.01">
            </div>
            <div class="input-group" id="measure3-group" style="display: none;">
                <label for="measure3">Medida 3 (m):</label>
                <input type="number" id="measure3" placeholder="Ex: 0.15" step="0.01">
            </div>
            <button class="btn btn-primary" id="calculate-btn">CALCULAR</button>

            <div class="result-box" id="result-box"></div>

            <div class="input-group">
                <label for="client-name">Nome do Cliente:</label>
                <input type="text" id="client-name" placeholder="Nome completo">
            </div>
            <div class="input-group">
                <label for="client-address">Endereço:</label>
                <input type="text" id="client-address" placeholder="Endereço completo">
            </div>
            <div class="input-group">
                <label for="client-date">Data:</label>
                <input type="date" id="client-date">
            </div>

            <div class="input-group">
                <label for="observation">Observação:</label>
                <input type="text" id="observation" placeholder="Digite uma observação ou 'apagar'">
                <button class="btn btn-secondary" id="add-obs-btn" style="margin-top: 10px;">ADICIONAR</button>
            </div>
            <div class="observations-list" id="observations-list">Nenhuma observação adicionada.</div>

            <button class="btn btn-primary" id="generate-pdf-btn">GERAR PDF</button>
            <button class="btn btn-secondary" id="back-btn">VOLTAR</button>
        </div>
    </div>

    <script>
        const services = {
            1: { name: "ALVENARIA", type: "m²", price: 52.00, hasThirdMeasure: false },
            2: { name: "REBOCO", type: "m²", price: 35.00, hasThirdMeasure: false },
            3: { name: "PORCELANATO", type: "m²", price: 60.00, hasThirdMeasure: false },
            4: { name: "CERÂMICA", type: "m²", price: 40.00, hasThirdMeasure: false },
            5: { name: "CONCRETO", type: "m³", price: 150.00, hasThirdMeasure: true },
            6: { name: "GESSO", type: "m²", price: 20.00, hasThirdMeasure: false }
        };

        let currentService = null;
        let observations = [];

        const serviceCards = document.querySelectorAll('.service-card');
        const servicesSection = document.getElementById('services-section');
        const calculatorSection = document.getElementById('calculator-section');
        const serviceTitle = document.getElementById('service-title');
        const measure3Group = document.getElementById('measure3-group');
        const backBtn = document.getElementById('back-btn');
        const calculateBtn = document.getElementById('calculate-btn');
        const addObsBtn = document.getElementById('add-obs-btn');
        const generatePdfBtn = document.getElementById('generate-pdf-btn');
        const resultBox = document.getElementById('result-box');
        const observationsList = document.getElementById('observations-list');
        const measure1 = document.getElementById('measure1');
        const measure2 = document.getElementById('measure2');
        const measure3 = document.getElementById('measure3');
        const clientName = document.getElementById('client-name');
        const clientAddress = document.getElementById('client-address');
        const clientDate = document.getElementById('client-date');
        const observation = document.getElementById('observation');

        // SELECIONAR SERVIÇO
        serviceCards.forEach(card => {
            card.addEventListener('click', () => {
                const id = card.dataset.service;
                currentService = services[id];
                serviceTitle.textContent = `${currentService.name} (${currentService.type})`;
                measure3Group.style.display = currentService.hasThirdMeasure ? 'block' : 'none';
                calculatorSection.style.display = 'block';
                servicesSection.style.display = 'none';
            });
        });

        // VOLTAR
        backBtn.addEventListener('click', () => {
            calculatorSection.style.display = 'none';
            servicesSection.style.display = 'grid';
            observations = [];
            observationsList.textContent = 'Nenhuma observação adicionada.';
            resultBox.textContent = '';
            measure1.value = '';
            measure2.value = '';
            measure3.value = '';
            clientName.value = '';
            clientAddress.value = '';
            clientDate.value = '';
            observation.value = '';
        });

        // CALCULAR
        calculateBtn.addEventListener('click', () => {
            const m1 = parseFloat(measure1.value);
            const m2 = parseFloat(measure2.value);
            if (isNaN(m1) || m1 <= 0 || isNaN(m2) || m2 <= 0) {
                alert('Digite valores válidos maiores que zero!');
                return;
            }

            let m3 = 1;
            if (currentService.hasThirdMeasure) {
                m3 = parseFloat(measure3.value);
                if (isNaN(m3) || m3 <= 0) {
                    alert('Digite uma medida válida maior que zero!');
                    return;
                }
            }

            const totalArea = m1 * m2 * m3;
            const totalPrice = totalArea * currentService.price;

            resultBox.textContent = `📌 SERVIÇO: ${currentService.name}
📏 TIPO: ${currentService.type}
📐 MEDIDAS: ${m1}m x ${m2}m ${currentService.hasThirdMeasure ? `x ${m3}m` : ''}
📊 TOTAL: ${totalArea.toFixed(2).replace('.', ',')} ${currentService.type}
💵 VALOR: R$ ${totalPrice.toFixed(2).replace('.', ',')}`;
        });

        // ADICIONAR OBSERVAÇÃO
        addObsBtn.addEventListener('click', () => {
            const txt = observation.value.trim();
            if (!txt) return;

            if (txt.toLowerCase() === 'apagar') {
                if (observations.length > 0) {
                    observations.pop();
                    alert('Observação removida!');
                } else {
                    alert('Nenhuma observação para apagar!');
                }
            } else {
                observations.push(txt);
                alert('Observação adicionada!');
            }

            observationsList.textContent = observations.length > 0 ? observations.map((obs, i) => `${i+1} - ${obs}`).join('\n') : 'Nenhuma observação adicionada.';
            observation.value = '';
        });

        // GERAR PDF
        generatePdfBtn.addEventListener('click', () => {
            if (!resultBox.textContent) {
                alert('Calcule o orçamento primeiro!');
                return;
            }

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            const data = clientDate.value || new Date().toLocaleDateString('pt-BR');
            const nome = clientName.value || 'Não informado';
            const endereco = clientAddress.value || 'Não informado';

            pdf.setFontSize(16);
            pdf.text('William Empreiteiro - Orçamento', 105, 15, { align: 'center' });
            pdf.line(10, 20, 200, 20);

            pdf.setFontSize(12);
            pdf.text(`Data: ${data}`, 10, 35);
            pdf.text(`Cliente: ${nome}`, 10, 45);
            pdf.text(`Endereço: ${endereco}`, 10, 55);
            pdf.text('\n' + resultBox.textContent, 10, 70);

            pdf.addPage();
            pdf.text('OBSERVAÇÕES', 10, 35);
            pdf.text(observationsList.textContent, 10, 50);

            pdf.save(`Orçamento_${currentService.name}_${data.replace(/\//g, '-')}.pdf`);
        });
    </script>
</body>
</html>
