<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leão - Faça o seu Orçamento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #FFE0B2 0%, #FF9800 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container-principal {
            background-color: white;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }

        /* TÍTULO IGUAL A SUA IMAGEM - COM LEÃO NATURAL! */
        .titulo-principal {
            text-align: center;
            margin-bottom: 40px;
        }

        .circulo-leao {
            width: 80px;
            height: 80px;
            border: 5px solid #FF5722;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            font-size: 1.8rem; /* TAMANHO PERFEITO - NEM GORDO NEM MAGRO */
            font-weight: 700;
            color: #FF5722;
        }

        .titulo-principal h1 {
            font-size: 2rem;
            color: #2D3436;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .titulo-principal span {
            display: block;
            font-size: 1.8rem;
            margin-top: 10px;
            color: #FF5722;
            font-weight: 700;
        }

        .grupo-formulario {
            margin-bottom: 25px;
            padding: 20px;
            background-color: #F8F9FA;
            border-radius: 15px;
            border-left: 5px solid #FF5722;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2D3436;
            font-weight: 600;
            font-size: 1.1rem;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #FF5722;
            box-shadow: 0 0 0 3px rgba(255,87,34,0.2);
        }

        /* BOTÕES SUPER MODERNOS */
        .botoes-area {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            color: white;
        }

        .btn-calcular {
            background: linear-gradient(135deg, #FF5722 0%, #FF7043 100%);
        }

        .btn-limpar {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>
    <div class="container-principal">
        <!-- TÍTULO EXATO DO SEU DESENHO! -->
        <div class="titulo-principal">
            <h1>
                <div class="circulo-leao">Leão</div>
                Faça o
                <div class="circulo-leao">Leão</div>
            </h1>
            <span>SEU ORÇAMENTO</span>
        </div>

        <!-- FORMULÁRIO DE DADOS -->
        <div class="grupo-formulario">
            <label>🛠️ TIPO DE SERVIÇO:</label>
            <select id="servico" required>
                <option value="">Selecione o serviço</option>
                <option value="alvenaria">Alvenaria - R$52,00/m²</option>
                <option value="reboco">Reboco - R$35,00/m²</option>
                <option value="porcelanato">Porcelanato - R$60,00/m²</option>
                <option value="ceramica">Cerâmica - R$40,00/m²</option>
                <option value="concreto">Concreto - R$150,00/m³</option>
            </select>

            <label>📏 MEDIDA 1 (Horizontal em m):</label>
            <input type="number" id="medida1" placeholder="Ex: 2" step="0.01" min="0" required>
            
            <label>📏 MEDIDA 2 (Vertical em m):</label>
            <input type="number" id="medida2" placeholder="Ex: 6" step="0.01" min="0" required>
            
            <label id="label-medida3" style="display: none;">📏 MEDIDA 3 (Profundidade em m):</label>
            <input type="number" id="medida3" placeholder="Ex: 0.5" step="0.01" min="0" style="display: none;">
        </div>

        <div class="grupo-formulario">
            <label>👤 NOME DO CLIENTE:</label>
            <input type="text" id="nome" placeholder="Seu nome completo" required>
            
            <label>🏠 ENDEREÇO DA OBRA:</label>
            <input type="text" id="endereco" placeholder="Rua, bairro, cidade" required>
        </div>

        <!-- BOTÕES DE AÇÃO -->
        <div class="botoes-area">
            <button class="btn btn-calcular" onclick="calcularEIrParaResultado()">Calcular Valor</button>
            <button class="btn btn-limpar" onclick="limparFormulario()">Limpar Tudo</button>
        </div>

    <script>
        // MOSTRA CAMPO DE PROFUNDIDADE QUANDO FOR CONCRETO
        document.getElementById('servico').addEventListener('change', function() {
            const servico = this.value;
            const med3 = document.getElementById('medida3');
            const labelMed3 = document.getElementById('label-medida3');
            
            if(servico === 'concreto') {
                med3.style.display = 'block';
                labelMed3.style.display = 'block';
            } else {
                med3.style.display = 'none';
                labelMed3.style.display = 'none';
            }
        });

        // FUNÇÃO PARA CALCULAR E IR PARA A PÁGINA DE RESULTADO
        function calcularEIrParaResultado() {
            const servico = document.getElementById('servico').value;
            const med1 = parseFloat(document.getElementById('medida1').value);
            const med2 = parseFloat(document.getElementById('medida2').value);
            const med3 = parseFloat(document.getElementById('medida3').value) || 0;
            const nome = document.getElementById('nome').value;
            const endereco = document.getElementById('endereco').value;

            // VERIFICA SE TODOS OS CAMPOS ESTÃO PREENCHIDOS
            if(!servico || !med1 || !med2 || !nome || !endereco || (servico === 'concreto' && !med3)) {
                alert('⚠️ Preencha todos os campos obrigatórios primeiro!');
                return;
            }

            // TABELA DE PREÇOS DOS SERVIÇOS
            const precos = {
                alvenaria: 52.00,
                reboco: 35.00,
                porcelanato: 60.00,
                ceramica: 40.00,
                concreto: 150.00
            };

            // CALCULA A MEDIDA TOTAL E O VALOR FINAL
            let medidaTotal = 0;
            let unidade = 'm²';
            
            if(servico === 'concreto') {
                medidaTotal = med1 * med2 * med3;
                unidade = 'm³';
            } else {
                medidaTotal = med1 * med2;
            }

            const valorTotal = medidaTotal * precos[servico];

            // ARMAZENA OS DADOS PARA MOSTRAR NA PRÓXIMA PÁGINA
            sessionStorage.setItem('nomeCliente', nome);
            sessionStorage.setItem('enderecoCliente', endereco);
            sessionStorage.setItem('servicoSelecionado', servico);
            sessionStorage.setItem('medidaTotal', medidaTotal.toFixed(2));
            sessionStorage.setItem('unidadeMedida', unidade);
            sessionStorage.setItem('valorFinal', valorTotal.toFixed(2));

            // REDIRECIONA PARA A PÁGINA DE RESULTADO
            window.location.href = 'pagina-resultado.html';
        }

        // FUNÇÃO PARA LIMPAR TODOS OS CAMPOS
        function limparFormulario() {
            document.querySelectorAll('input, select').forEach(campo => campo.value = '');
            document.getElementById('medida3').style.display = 'none';
            document.getElementById('label-medida3').style.display = 'none';
        }
    </script>
</body>
</html>
