    <script>
        // FUNÇÃO PARA MENU MOBILE
        function toggleMenu() {
            const menu = document.getElementById('menuMobile');
            menu.classList.toggle('hidden');
        }

        // DADOS DOS SERVIÇOS
        const servicos = {
            1: {nome: "Alvenaria", tipo: "m²", valor: 52.00},
            2: {nome: "Reboco", tipo: "m²", valor: 35.00},
            3: {nome: "Porcelanato", tipo: "m²", valor: 60.00},
            4: {nome: "Cerâmica", tipo: "m²", valor: 40.00},
            5: {nome: "Concreto", tipo: "m³", valor: 300.00},
            6: {nome: "Gesso", tipo: "m²", valor: 20.00}
        };

        // FUNÇÃO PARA ENVIAR ORÇAMENTO
        function enviarOrcamento() {
            const nome = document.getElementById('nomeCliente').value;
            const telefone = document.getElementById('telefoneCliente').value;
            const servico = document.getElementById('servicoCliente').value;
            const mensagem = document.getElementById('mensagemCliente').value;

            if(!nome || !telefone || !servico || !mensagem) {
                alert("PREENCHA TODOS OS CAMPOS!");
                return;
            }

            // SIMULA ENVIO PARA WHATSAPP
            const mensagemWhats = `Olá William! Eu sou ${nome}, gostaria de solicitar orçamento para o serviço de ${servicos[servico].nome}.\n\nMensagem: ${mensagem}\nTelefone: ${telefone}`;
            const linkWhats = `https://wa.me/55${telefone.replace(/\D/g, '')}?text=${encodeURIComponent(mensagemWhats)}`;
            
            window.open(linkWhats, '_blank');
            alert("ORÇAMENTO SOLICITADO COM SUCESSO! VOCÊ SERÁ REDIRECIONADO PARA O WHATSAPP!");
            document.getElementById('formOrcamento').reset();
        }

        // FUNÇÃO PARA ROLAGEM SUAVE
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                window.scrollTo({
                    top: target.offsetTop - 80,
                    behavior: 'smooth'
                });
            });
        });

        // MÁSCARA PARA TELEFONE
        const telefoneInput = document.getElementById('telefoneCliente');
        telefoneInput.addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, '');
            if(valor.length > 10) {
                valor = valor.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
            } else {
                valor = valor.replace(/^(\d{2})(\d{4})(\d{0,4})$/, '($1) $2-$3');
            }
            e.target.value = valor;
        });
    </script>
