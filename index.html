<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Empreiteiro - Orçamentos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            padding: 20px;
        }

        .app-container {
            max-width: 700px;
            margin: 0 auto;
            background-color: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
        }

        .lion-container {
            width: 250px;
            height: 250px;
            margin: 0 auto 30px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #2d5d2a;
        }

        .lion-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .app-header h1 {
            color: #2d5d2a;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .app-header p {
            color: #666;
            font-size: 16px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .service-card {
            background-color: #f8f9fa;
            border: 2px solid #2d5d2a;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            font-size: 18px;
            color: #333;
            transition: all 0.3s ease;
        }

        .service-card:hover {
            background-color: #2d5d2a;
            color: white;
            transform: translateY(-5px);
        }

        .service-card p {
            font-size: 14px;
            margin-top: 10px;
        }

        .calculator-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            display: none;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .result-box {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            white-space: pre-line;
            border: 1px solid #2d5d2a;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.3s ease;
        }

        .btn-primary {
            background-color: #2d5d2a;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1e3d1c;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #545b62;
        }

        .observations-list {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            white-space: pre-line;
            border: 1px solid #ddd;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="lion-container">
                <img src="https://i.postimg.cc/XYSHLS21/leao-(1).jpg" alt="Leão" class="lion-img">
            </div>
            <h1>William Empreiteiro - Orçamentos</h1>
            <p>Sistema moderno para cálculo e emissão de orçamentos</p>
        </div>

        <div class="services-grid" id="services-section">
            <div class="service-card" data-service="1">
                <h3>ALVENARIA</h3>
                <p>R$52,00 / m²</p>
            </div>
            <div class="service-card" data-service="2">
                <h3>REBOCO</h3>
                <p>R$35,00 / m²</p>
            </div>
            <div class="service-card" data-service="3">
                <h3>PORCELANATO</h3>
                <p>R$60,00 / m²</p>
            </div>
            <div class="service-card" data-service="4">
                <h3>CERÂMICA</h3>
                <p>R$40,00 / m²</p>
            </div>
            <div class="service-card" data-service="5">
                <h3>CONCRETO</h3>
                <p>R$150,00 / m³</p>
            </div>
            <div class="service-card" data-service="6">
                <h3>GESSO</h3>
                <p>R$20,00 / m²</p>
            </div>
        </div>

        <div id="calculator-section" class="calculator-section">
            <h2 id="service-title" style="color: #2d5d2a; margin-bottom: 20px; text-align: center;"></h2>
            <div class="input-group">
                <label for="measure1">Medida 1 (m):</label>
                <input type="number" id="measure1" placeholder="Ex: 5.20" step="0.01">
            </div>
            <div class="input-group">
                <label for="measure2">Medida 2 (m):</label>
                <input type="number" id="measure2" placeholder="Ex: 3.50" step="0.01">
            </div>
            <div class="input-group" id="measure3-group" style="display: none;">
                <label for="measure3">Medida 3 (m):</label>
                <input type="number" id="measure3" placeholder="Ex: 0.15" step="0.01">
            </div>
            <button class="btn btn-primary" id="calculate-btn">CALCULAR</button>

            <div class="result-box" id="result-box"></div>

            <div class="input-group">
                <label for="client-name">Nome do Cliente:</label>
                <input type="text" id="client-name" placeholder="Nome completo">
            </div>
            <div class="input-group">
                <label for="client-address">Endereço:</label>
                <input type="text" id="client-address" placeholder="Endereço completo">
            </div>
            <div class="input-group">
                <label for="client-date">Data do Orçamento:</label>
                <input type="date" id="client-date">
            </div>

            <div class="input-group">
                <label for="observation">Observação:</label>
                <input type="text" id="observation" placeholder="Digite uma observação ou 'apagar' para remover última">
                <button class="btn btn-secondary" id="add-obs-btn" style="margin-top: 10px;">ADICIONAR</button>
            </div>
            <div class="observations-list" id="observations-list">Nenhuma observação adicionada.</div>

            <button class="btn btn-primary" id="generate-pdf-btn">GERAR PDF</button>
            <button class="btn btn-secondary" id="back-btn">VOLTAR</button>
        </div>
    </div>

    <script>
        // DADOS DOS SERVIÇOS
        const services = {
            1: { name: "ALVENARIA", type: "m²", price: 52.00, hasThirdMeasure: false },
            2: { name: "REBOCO", type: "m²", price: 35.00, hasThirdMeasure: false },
            3: { name: "ACABAMENTO (PORCELANATO)", type: "m²", price: 60.00, hasThirdMeasure: false },
            4: { name: "ACABAMENTO (CERÂMICA)", type: "m²", price: 40.00, hasThirdMeasure: false },
            5: { name: "CONCRETO", type: "m³", price: 150.00, hasThirdMeasure: true },
            6: { name: "GESSO", type: "m²", price: 20.00, hasThirdMeasure: false }
        };

        let currentService = null;
        let observations = [];

        // SELECIONA TODOS OS ELEMENTOS
        const serviceCards = document.querySelectorAll('.service-card');
        const calculatorSection = document.getElementById('calculator-section');
        const serviceTitle = document.getElementById('service-title');
        const measure3Group = document.getElementById('measure3-group');
        const backBtn = document.getElementById('back-btn');
        const calculateBtn = document.getElementById('calculate-btn');
        const addObsBtn = document.getElementById('add-obs-btn');
        const generatePdfBtn = document.getElementById('generate-pdf-btn');
        const resultBox = document.getElementById('result-box');
        const observationsList = document.getElementById('observations-list');

        // FUNÇÃO PARA SELECIONAR SERVIÇO
        serviceCards.forEach(card => {
            card.addEventListener('click', function() {
                const serviceId = this.dataset.service;
                currentService = services[serviceId];
                serviceTitle.textContent = `${currentService.name} (${currentService.type})`;
                measure3Group.style.display = currentService.hasThirdMeasure ? 'block' : 'none';
                calculatorSection.style.display = 'block';
                document.getElementById('services-section').style.display = 'none';
            });
        });

        // FUNÇÃO PARA VOLTAR
        backBtn.addEventListener('click', function() {
            calculatorSection.style.display = 'none';
            document.getElementById('services-section').style.display = 'grid';
            observations = [];
            observationsList.textContent = 'Nenhuma observação adicionada.';
            resultBox.textContent = '';
            document.getElementById('measure1').value = '';
            document.getElementById('measure2').value = '';
            document.getElementById('measure3').value = '';
            document.getElementById('client-name').value = '';
            document.getElementById('client-address').value = '';
            document.getElementById('client-date').value = '';
            document.getElementById('observation').value = '';
        });

        // FUNÇÃO PARA CALCULAR
        calculateBtn.addEventListener('click', function() {
            const m1 = parseFloat(document.getElementById('measure1').value);
            const m2 = parseFloat(document.getElementById('measure2').value);

            if (isNaN(m1) || m1 <= 0 || isNaN(m2) || m2 <= 0) {
                alert('Digite apenas números maiores que zero nas medidas!');
                return;
            }

            let m3 = 1;
            if (currentService.hasThirdMeasure) {
                m3 = parseFloat(document.getElementById('measure3').value);
                if (isNaN(m3) || m3 <= 0) {
                    alert('Digite apenas números maiores que zero na medida 3!');
                    return;
                }
            }

            const totalMeasure = m1 * m2 * m3;
            const totalPrice = totalMeasure * currentService.price;

            resultBox.textContent = `
📌 SERVIÇO: ${currentService.name}
📏 TIPO: ${currentService.type}
📐 MEDIDAS: ${m1}m x ${m2}m ${currentService.hasThirdMeasure ? `x ${m3}m` : ''}
📊 MEDIDA TOTAL: ${totalMeasure.toFixed(2).replace('.', ',')} ${currentService.type}
💵 VALOR UNITÁRIO: R$ ${currentService.price.toFixed(2).replace('.', ',')}
💰 VALOR TOTAL: R$ ${totalPrice.toFixed(2).replace('.', ',')}
            `;
        });

        // FUNÇÃO PARA ADICIONAR OBSERVAÇÃO
        addObsBtn.addEventListener('click', function() {
            const obsText = document.getElementById('observation').value.trim();
            if (!obsText) return;

            if (obsText.toLowerCase() === 'apagar') {
                if (observations.length > 0) {
                    observations.pop();
                    alert('Última observação removida!');
                } else {
                    alert('Nenhuma observação para apagar!');
                }
            } else {
                observations.push(obsText);
                alert('Observação adicionada!');
            }

            updateObservations();
            document.getElementById('observation').value = '';
        });

        function updateObservations() {
            if (observations.length === 0) {
                observationsList.textContent = 'Nenhuma observação adicionada.';
            } else {
                observationsList.textContent = observations.map((obs, i) => `${i+1} - ${obs}`).join('\n');
            }
        }

        // FUNÇÃO PARA GERAR PDF
        generatePdfBtn.addEventListener('click', function() {
            const result = resultBox.textContent;
            if (!result) {
                alert('Calcule o orçamento primeiro!');
                return;
            }

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();

            pdf.setFontSize(16);
            pdf.text('William Empreiteiro - Orçamento', 105, 15, { align: 'center' });
            pdf.line(10, 20, 200, 20);

            pdf.setFontSize(12);
            pdf.text('DADOS DO ORÇAMENTO', 10, 35);
            pdf.text(result.replace(/\n/g, '\n'), 10, 50);

            pdf.addPage();
            pdf.text('DADOS DO CLIENTE', 10, 35);
            const name = document.getElementById('client-name').value || 'Não informado';
            const address = document.getElementById('client-address').value || 'Não informado';
            const date = document.getElementById('client-date').value || new Date().toLocaleDateString('pt-BR');
            pdf.text(`Nome: ${name}`, 10, 50);
            pdf.text(`Endereço: ${address}`, 10, 60);
            pdf.text(`Data: ${date}`, 10, 70);

            pdf.text('OBSERVAÇÕES', 10, 85);
            const obsText = observations.length > 0 ? observations.join('\n') : 'Nenhuma observação adicionada.';
            pdf.text(obsText, 10, 100);

            pdf.save(`Orçamento_${currentService.name}_${new Date().
