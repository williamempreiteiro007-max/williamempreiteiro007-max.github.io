<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Empreiteiro - Orçamentos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        button {
            padding: 12px 20px;
            background-color: #2d5d2a;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px 0;
            box-sizing: border-box;
        }
        .detalhes {
            white-space: pre-line;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>William Empreiteiro - Cálculos de Obras</h1>
        
        <button onclick="main()">INICIAR SISTEMA</button>
        <div id="saida" class="detalhes"></div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script>
            // ---------------------- FUNÇÕES AUXILIARES ----------------------
            function validarNumero(mensagem) {
                while (true) {
                    const texto = prompt(mensagem).replace('.', '', 1).replace(',', '.');
                    const numero = parseFloat(texto);
                    if (!isNaN(numero)) return numero;
                    alert("❌ APENAS NÚMEROS REAIS (ex: 2,5 ou 2.5)\n");
                }
            }

            function limparTela() {
                document.getElementById('saida').textContent = "";
            }

            function formatarNumero(num) {
                if (typeof num !== 'number') {
                    try {
                        num = parseFloat(num.replace('.', '', 1).replace(',', '.'));
                    } catch (e) {
                        return num;
                    }
                }
                if (num % 1 === 0) {
                    return num.toLocaleString('pt-BR', { maximumFractionDigits: 0 });
                } else {
                    return num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                }
            }

            // ---------------------- FUNÇÃO PRINCIPAL ----------------------
            function main() {
                limparTela();
                const servicos = {
                    "1": {"nome": "ALVENARIA", "tipo": "M²", "valor": 52.00, "desc": "Apenas mão de obra para alvenaria"},
                    "2": {"nome": "REBOCO", "tipo": "M²", "valor": 35.00, "desc": "Apenas mão de obra para reboco de paredes"},
                    "3": {"nome": "ACABAMENTO (PORCELANATO)", "tipo": "M²", "valor": 60.00, "desc": "Apenas mão de obra para assentamento de porcelanato"},
                    "4": {"nome": "ACABAMENTO (CERÂMICA)", "tipo": "M²", "valor": 40.00, "desc": "Apenas mão de obra para assentamento de cerâmica"},
                    "5": {"nome": "CONCRETO", "tipo": "M³", "valor": 150.00, "desc": "Apenas mão de obra para estruturas"},
                    "6": {"nome": "GESSO", "tipo": "M²", "valor": 20.00, "desc": "Apenas mão de obra - valor fixo"}
                };

                // MENU DE SERVIÇOS
                let opcao = prompt(`
🔨 OPÇÕES DE SERVIÇOS:
1 - ALVENARIA
2 - REBOCO
3 - ACABAMENTO (PORCELANATO)
4 - ACABAMENTO (CERÂMICA)
5 - CONCRETO
6 - GESSO
7 - SAIR

DIGITE A OPÇÃO DESEJADA:
                `).trim();

                if (opcao === "7" || opcao === "") {
                    alert("👋 ATÉ MAIS, PARCEIRO!");
                    return;
                }

                if (!servicos[opcao]) {
                    alert("❌ OPÇÃO INVÁLIDA!");
                    main();
                    return;
                }

                const servico = servicos[opcao];
                const medida1 = validarNumero("📏 DIGITE A MEDIDA 1 (m): ");
                const medida2 = validarNumero("📏 DIGITE A MEDIDA 2 (m): ");
                let medida3 = 1;

                if (servico.tipo === "M³") {
                    medida3 = validarNumero("📏 DIGITE A MEDIDA 3 (m): ");
                }

                const medidaTotal = medida1 * medida2 * medida3;
                const valorTotal = medidaTotal * servico.valor;
                const detalhes = `
📌 SERVIÇO: ${servico.nome}
📏 TIPO DE CÁLCULO: ${servico.tipo}
📝 DESCRIÇÃO: ${servico.desc}
📊 MEDIDAS: ${medida1}m X ${medida2}m ${servico.tipo === "M³" ? `X ${medida3}m` : ""}
📈 MEDIDA TOTAL: ${formatarNumero(medidaTotal)} ${servico.tipo}
💵 VALOR TOTAL: R$ ${formatarNumero(valorTotal)}
                `;

                document.getElementById('saida').textContent = detalhes;

                // GERAR PDF
                if (confirm("💾 DESEJA GERAR O PDF?")) {
                    gerarPDF(servico, detalhes);
                }
            }

            // ---------------------- GERAR PDF ----------------------
            function gerarPDF(servico, detalhes) {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                
                pdf.setFontSize(24);
                pdf.text("William Empreiteiro - Cálculos de Obras", 105, 20, { align: 'C' });
                pdf.line(10, 35, 200, 35);
                
                pdf.setFontSize(18);
                pdf.text("DADOS DO ORÇAMENTO", 10, 50);
                pdf.setFontSize(14);
                pdf.text(detalhes.replace(/\n/g, '\n'), 10, 70);
                
                const nomeArq = prompt("📄 DIGITE O NOME DO ARQUIVO:") || "ORCAMENTO";
                pdf.save(`${nomeArq}.pdf`);
                alert("✅ PDF SALVO COM SUCESSO!");
            }
        </script>
    </div>
</body>
</html>
