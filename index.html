<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faça o seu Orçamento - Construção Civil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            padding: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .leao-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #FF8C00;
            display: block;
            margin: 0 auto 15px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        h2 {
            color: #FF8C00;
            margin: 15px 0 10px;
            font-size: 1.3rem;
        }

        .secao {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 5px;
        }

        label {
            display: block;
            margin: 8px 0 4px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .botoes {
            background-color: #FF8C00;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            margin: 8px 0;
            width: 100%;
            transition: background-color 0.3s;
        }

        .botoes:hover {
            background-color: #e67e00;
        }

        .resultado {
            background-color: #e9f7fe;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-weight: bold;
            white-space: pre-line;
        }
    </style>
    <!-- Bibliotecas necessárias para gerar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Imagem do leão -->
        <img src="https://i.postimg.cc/XYSHLS21/leao-(1).jpg" alt="Logo Leão" class="leao-logo">
        
        <h1>Faça o seu Orçamento</h1>
        <p style="text-align: center; font-size: 1rem; margin-bottom: 20px;">
            Contato WhatsApp: <strong>(55)31990721928</strong>
        </p>

        <!-- Seção de serviço -->
        <div class="secao">
            <h2>1. Escolha o Serviço</h2>
            <select id="servico" onchange="atualizarCamposMedidas()">
                <option value="1">ALVENARIA (M²) - Apenas mão de obra</option>
                <option value="2">REBOCO (M²) - Apenas mão de obra</option>
                <option value="3">PORCELANATO (M²) - Apenas mão de obra</option>
                <option value="4">CERÂMICA (M²) - Apenas mão de obra</option>
                <option value="5">CONCRETO (M³) - Apenas mão de obra</option>
                <option value="6">GESSO (M²) - Apenas mão de obra</option>
            </select>
        </div>

        <!-- Seção de medidas -->
        <div class="secao" id="secao-medidas">
            <h2>2. Insira as Medidas (em metros)</h2>
            <div id="campos-medidas">
                <label for="horizontal">Horizontal (m):</label>
                <input type="number" id="horizontal" step="0.01" min="0" required>

                <label for="vertical">Vertical (m):</label>
                <input type="number" id="vertical" step="0.01" min="0" required>
            </div>
        </div>

        <!-- Seção de cliente -->
        <div class="secao">
            <h2>3. Dados do Cliente</h2>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required>

            <label for="data">Data:</label>
            <input type="date" id="data" required>

            <label for="endereco">Endereço da Obra:</label>
            <input type="text" id="endereco" required>

            <label for="email">E-mail (Opcional):</label>
            <input type="email" id="email">

            <label for="telefone">Telefone (Opcional):</label>
            <input type="text" id="telefone">

            <label for="observacoes">Observações:</label>
            <textarea id="observacoes" rows="3"></textarea>
        </div>

        <!-- Botões -->
        <button class="botoes" onclick="calcularOrcamento()">Calcular Orçamento</button>
        <button class="botoes" onclick="gerarPDF()">Gerar PDF</button>
        <button class="botoes" onclick="limparCampos()">Limpar Tudo</button>

        <!-- Área de resultado -->
        <div class="secao" id="secao-resultado" style="display: none;">
            <h2>Resultado do Cálculo</h2>
            <div id="resultado" class="resultado"></div>
        </div>
    </div>

    <script>
        // Dados dos serviços
        const servicos = {
            "1": {"nome": "ALVENARIA", "tipo": "M²", "valor": 52.00, "desc": "Apenas mão de obra para alvenaria"},
            "2": {"nome": "REBOCO", "tipo": "M²", "valor": 35.00, "desc": "Apenas mão de obra para reboco de paredes"},
            "3": {"nome": "PORCELANATO", "tipo": "M²", "valor": 60.00, "desc": "Apenas mão de obra para assentamento de porcelanato"},
            "4": {"nome": "CERÂMICA", "tipo": "M²", "valor": 40.00, "desc": "Apenas mão de obra para assentamento de cerâmica"},
            "5": {"nome": "CONCRETO", "tipo": "M³", "valor": 150.00, "desc": "Apenas mão de obra para estruturas"},
            "6": {"nome": "GESSO", "tipo": "M²", "valor": 20.00, "desc": "Apenas mão de obra - valor fixo por m²"}
        };

        // Atualiza campos de medidas
        function atualizarCamposMedidas() {
            const servicoId = document.getElementById('servico').value;
            const servico = servicos[servicoId];
            const camposDiv = document.getElementById('campos-medidas');
            
            if (servico.tipo === "M²") {
                camposDiv.innerHTML = `
                    <label for="horizontal">Horizontal (m):</label>
                    <input type="number" id="horizontal" step="0.01" min="0" required>
                    <label for="vertical">Vertical (m):</label>
                    <input type="number" id="vertical" step="0.01" min="0" required>
                `;
            } else {
                camposDiv.innerHTML = `
                    <label for="horizontal">Horizontal (m):</label>
                    <input type="number" id="horizontal" step="0.01" min="0" required>
                    <label for="vertical">Vertical (m):</label>
                    <input type="number" id="vertical" step="0.01" min="0" required>
                    <label for="profundidade">Profundidade/Altura (m):</label>
                    <input type="number" id="profundidade" step="0.01" min="0" required>
                `;
            }
        }

        // Formata números para moeda
        function formatarNumero(num) {
            return num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Calcula orçamento
        function calcularOrcamento() {
            try {
                const servicoId = document.getElementById('servico').value;
                const servico = servicos[servicoId];
                const horizontal = parseFloat(document.getElementById('horizontal').value);
                const vertical = parseFloat(document.getElementById('vertical').value);
                
                if (isNaN(horizontal) || isNaN(vertical) || horizontal <= 0 || vertical <= 0) {
                    alert("⚠️ Insira medidas válidas maiores que zero!");
                    return;
                }

                let medidaTotal = 0;
                let detalhes = '';

                if (servico.tipo === "M²") {
                    medidaTotal = horizontal * vertical;
                    detalhes = `Serviço: ${servico.nome}
Tipo de Cálculo: ${servico.tipo}
Descrição: ${servico.desc}
Fórmula: HORIZONTAL X VERTICAL
Medidas: ${formatarNumero(horizontal)}m X ${formatarNumero(vertical)}m = ${formatarNumero(medidaTotal)} ${servico.tipo}
Valor por ${servico.tipo}: R$ ${formatarNumero(servico.valor)}
VALOR TOTAL: R$ ${formatarNumero(medidaTotal * servico.valor)}`;
                } else {
                    const profundidade = parseFloat(document.getElementById('profundidade').value);
                    if (isNaN(profundidade) || profundidade <= 0) {
                        alert("⚠️ Insira uma profundidade válida maior que zero!");
                        return;
                    }
                    medidaTotal = horizontal * vertical * profundidade;
                    detalhes = `Serviço: ${servico.nome}
Tipo de Cálculo: ${servico.tipo}
Descrição: ${servico.desc}
Fórmula: HORIZONTAL X VERTICAL X PROFUNDIDADE
Medidas: ${formatarNumero(horizontal)}m X ${formatarNumero(vertical)}m X ${formatarNumero(profundidade)}m = ${formatarNumero(medidaTotal)} ${servico.tipo}
Valor por ${servico.tipo}: R$ ${formatarNumero(servico.valor)}
VALOR TOTAL: R$ ${formatarNumero(medidaTotal * servico.valor)}`;
                }

                document.getElementById('resultado').textContent = detalhes;
                document.getElementById('secao-resultado').style.display = 'block';
            } catch (erro) {
                alert("⚠️ Preencha todos os campos corretamente antes de calcular!");
            }
        }

        // Gera PDF
        function gerarPDF() {
            const resultadoExistente = document.getElementById('secao-resultado').style.display === 'block';
            if (!resultadoExistente) {
                alert("⚠️ Calcule o orçamento primeiro antes de gerar o PDF!");
                return;
            }

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

            // Configurações de fonte
            pdf.setFont("helvetica");
            pdf.setFontSize(24);
            pdf.setFontType("bold");
            pdf.text("Faça o seu Orçamento", 105, 20, { align: 'center' });

            // Linha divisória
            pdf.setLineWidth(0.5);
            pdf.line(10, 32, 200, 32);

            // Adiciona imagem do leão
            html2canvas(document.querySelector('.leao-logo')).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                pdf.addImage(imgData, 'PNG', 10, 8, 33, 33);
                pdf.setDrawColor(255, 140, 0);
                pdf.setLineWidth(2);
                pdf.circle(26.5, 24.5, 16.5);

                // Dados do orçamento
                pdf.setFontSize(22);
                pdf.setFontType("bold");
                pdf.text("DADOS DO ORÇAMENTO", 10, 50);

                pdf.setFontSize(20);
                pdf.setFontType("normal");
                const servicoId = document.getElementById('servico').value;
                const servico = servicos[servicoId];
                const data = document.getElementById('data').value.split('-').reverse().join('/');
                const textoOrcamento = `Serviço: ${servico.nome}
Tipo de Cálculo: ${servico.tipo}
Descrição: ${servico.desc}
Data: ${data}`;
                pdf.text(textoOrcamento, 10, 65);

                // Resultados
                pdf.setFontSize(22);
                pdf.setFontType("bold");
                pdf.text("RESULTADOS DOS CÁLCULOS", 10, 100);

                pdf.setFontSize(20);
                pdf.setFontType("normal");
                const resultado = document.getElementById('resultado').textContent;
                pdf.text(resultado, 10, 115);

                // Dados do cliente
                pdf.setFontSize(22);
                pdf.setFontType("bold");
                pdf.text("DADOS DO CLIENTE", 10, 160);

                pdf.setFontSize(20);
                pdf.setFontType("normal");
                const nome = document.getElementById('nome').value;
                const endereco = document.getElementById('endereco').value;
                const email = document.getElementById('email').value;
                const telefone = document.getElementById('telefone').value;
                const observacoes = document.getElementById('observacoes').value || "Nenhuma observação informada.";

                let textoCliente = `Nome: ${nome}
Endereço: ${endereco}`;
                if (email) textoCliente += `\nE-mail: ${email}`;
                if (telefone) textoCliente += `\nTelefone: ${telefone}`;
                pdf.text(textoCliente, 10, 175);

                // Observações
                pdf.setFontSize(22);
                pdf.setFontType("bold");
                pdf.text("OBSERVAÇÕES", 10, 210);

                pdf.setFontSize(20);
                pdf.setFontType("normal");
                pdf.text(observacoes, 10, 225);

                // Contato
                pdf.addPage();
                pdf.setFontSize(20);
                pdf.text("Se gostar do orçamento, entre em contato pelo WhatsApp: (55)31990721928", 10, 20);

                // Salva o PDF
                pdf.save(`ORCAMENTO_${nome.replace(/\s+/g, '_').toUpperCase()}_${data.replace(/\//g, '-')}.pdf`);
            });
        }

        // Limpa todos os campos
        function limparCampos() {
            document.getElementById('servico').value = "1";
